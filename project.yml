name: inkies
options:
  bundleIdPrefix: listentotherain
packages:
  WhatsNewKit:
    url: https://github.com/SvenTiigi/WhatsNewKit
    from: 2.2.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
targets:
  inkies:
    type: application
    platform: macOS
    deploymentTarget: "14.6"
    documentTypes:
      - name: Ink Source
        role: Editor
        rank: Owner
        icon: InkIcon
        identifiers:
          - com.inkle.ink
    utiDeclarations:
      - identifier: com.inkle.ink
        description: Ink Source
        conformsTo:
          - public.plain-text
        extensions:
          - ink
        icon: InkIcon
      - identifier: com.inkle.ink-json
        description: Ink JSON
        conformsTo:
          - public.json
        extensions:
          - json
    sources:
      - path: inkies
        excludes:
          - "Resources/**"
      - path: inkies/Resources/Compiler/inklecate
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Compiler
            codeSignOnCopy: true
      - path: inkies/Resources/Compiler/ink_compiler.dll
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Compiler
      - path: inkies/Resources/Compiler/ink-engine-runtime.dll
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Compiler
      - path: inkies/Resources/Scripts/ink.min.js
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Scripts
      - path: inkies/Resources/Localizable.xcstrings
        buildPhase: resources
      - path: inkies/Resources/Examples
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Examples
      - path: inkies/Resources/InkIcon.icns
        buildPhase: resources
    dependencies:
      - package: WhatsNewKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        CURRENT_PROJECT_VERSION: 100
        DEVELOPMENT_TEAM: W7A747LNTR
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_PREVIEWS: YES
        INFOPLIST_FILE: inkies/Info.plist
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        MARKETING_VERSION: 1.0.0
        PRODUCT_BUNDLE_IDENTIFIER: listentotherain.inkies
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        SWIFT_VERSION: 6.0
        LOCALIZATION_PREFERS_STRING_CATALOGS: YES
      debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        GCC_OPTIMIZATION_LEVEL: 0
        DEBUG_INFORMATION_FORMAT: dwarf
      release:
        SWIFT_COMPILATION_MODE: wholemodule
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        ENABLE_NS_ASSERTIONS: NO
