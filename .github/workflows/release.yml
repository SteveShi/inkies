name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  inspect:
    name: Inspect Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      version_tag: ${{ steps.get_version.outputs.VERSION_TAG }}
      skipped: ${{ steps.check_version.outputs.skipped }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Extract Version from Changelog
        id: get_version
        run: |
          VERSION=$(sed -n '/## \[/p' CHANGELOG.md | head -n 1 | cut -d'[' -f2 | cut -d']' -f1)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from CHANGELOG.md"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected Version: $VERSION"

      - name: Check If Version Already Released
        id: check_version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.VERSION }}"
          if gh release view "$TAG" >/dev/null 2>&1 && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Version $TAG already exists. Skipping release."
            echo "skipped=true" >> $GITHUB_OUTPUT
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build and Release
    needs: inspect
    if: needs.inspect.outputs.skipped != 'true'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Prepare Environment
        run: |
          echo "VERSION=${{ needs.inspect.outputs.version }}" >> $GITHUB_ENV
          echo "VERSION_TAG=${{ needs.inspect.outputs.version_tag }}" >> $GITHUB_ENV

      - name: Install Tools
        run: |
          brew install xcodegen
          brew install create-dmg

      - name: Set up Xcode
        uses: lpgneg19/setup-xcode@v2
        with:
          xcode-version: 'latest-stable'

      - name: Generate Project
        run: xcodegen

      - name: Resolve Package Dependencies
        run: xcodebuild -resolvePackageDependencies -scheme inkies -project inkies.xcodeproj

      - name: Build Universal App
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          xcodebuild build \
            -scheme inkies \
            -destination "platform=macOS" \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            MARKETING_VERSION=$VERSION_CLEAN \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            ENABLE_APP_INTENTS_METADATA_EXTRACTION=NO \
            ONLY_ACTIVE_ARCH=NO \
            MACOSX_DEPLOYMENT_TARGET=14.6 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -skipPackageUpdates

      - name: Prepare Universal App
        run: |
          mkdir -p Build/Universal
          cp -R ./DerivedData/Build/Products/Release/inkies.app Build/Universal/
          # Ad-hoc sign the app with Hardened Runtime options to ensure system features work correctly
          codesign --force --deep --sign - --options=runtime --entitlements inkies/inkies.entitlements Build/Universal/inkies.app

      - name: Split Architectures (x86_64 & arm64)
        run: |
          mkdir -p Build/x86_64/inkies.app
          mkdir -p Build/arm64/inkies.app
          
          # Copy Universal app to specific folders
          cp -R Build/Universal/inkies.app/ Build/x86_64/inkies.app/
          cp -R Build/Universal/inkies.app/ Build/arm64/inkies.app/
          
          # Thin main executable
          lipo -thin x86_64 Build/Universal/inkies.app/Contents/MacOS/inkies -output Build/x86_64/inkies.app/Contents/MacOS/inkies
          lipo -thin arm64 Build/Universal/inkies.app/Contents/MacOS/inkies -output Build/arm64/inkies.app/Contents/MacOS/inkies
          
          # Re-sign thinned apps deeply with runtime options
          codesign --force --deep --sign - --options=runtime --entitlements inkies/inkies.entitlements Build/x86_64/inkies.app
          codesign --force --deep --sign - --options=runtime --entitlements inkies/inkies.entitlements Build/arm64/inkies.app

      - name: Create DMGs and ZIPs
        id: create_assets
        run: |
          VERSION=${{ env.VERSION }}
          
          # Universal ZIP (for Sparkle)
          cd Build/Universal
          zip -r "../../inkies-${VERSION}-Universal.zip" "inkies.app"
          cd -

          # Universal DMG
          create-dmg \
            --volname "inkies Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "inkies.app" 200 190 \
            --hide-extension "inkies.app" \
            --app-drop-link 600 185 \
            "inkies-${VERSION}-Universal.dmg" \
            "Build/Universal/inkies.app"

          # x86_64 DMG
          create-dmg \
            --volname "inkies Installer (Intel)" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "inkies.app" 200 190 \
            --hide-extension "inkies.app" \
            --app-drop-link 600 185 \
            "inkies-${VERSION}-x86_64.dmg" \
            "Build/x86_64/inkies.app"

          # arm64 DMG
          create-dmg \
            --volname "inkies Installer (Apple Silicon)" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "inkies.app" 200 190 \
            --hide-extension "inkies.app" \
            --app-drop-link 600 185 \
            "inkies-${VERSION}-arm64.dmg" \
            "Build/arm64/inkies.app"
          
          echo "ZIP_NAME=inkies-${VERSION}-Universal.zip" >> $GITHUB_ENV

      - name: Extract Release Notes (en & zh)
        run: |
          VERSION_CLEAN=${{ env.VERSION }}
          awk "/^## \[$VERSION_CLEAN\]/{flag=1;next} /^## \[/{flag=0} flag" CHANGELOG.md > full_notes.md
          
          if [ ! -s full_notes.md ]; then
            echo "Release for version $VERSION_CLEAN. Check CHANGELOG.md for details." > release_notes_en.md
            cp release_notes_en.md release_notes_zh.md
          else
            sed -n '1,/### Chinese/p' full_notes.md | grep -v "### Chinese" > release_notes_en.md
            sed -n '/### Chinese/,$p' full_notes.md | sed '1d' > release_notes_zh.md
            
            if [ ! -s release_notes_zh.md ]; then cp release_notes_en.md release_notes_zh.md; fi
            if [ ! -s release_notes_en.md ]; then cp full_notes.md release_notes_en.md; fi
          fi
          cp full_notes.md release_notes.md

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_SECRET: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz
          tar -xf Sparkle-2.9.0.tar.xz
          CLEAN_KEY=$(echo "$SPARKLE_SECRET" | sed 's/EdDSAPrivateKey://' | tr -dc 'A-Za-z0-9+/=')
          
          if [ -z "$CLEAN_KEY" ]; then
            echo "ERROR: SPARKLE_PRIVATE_KEY secret is missing!"
            exit 1
          fi

          mkdir -p deploy
          cp "${{ env.ZIP_NAME }}" deploy/
          cp release_notes_en.md "deploy/release_notes_en.md"
          cp release_notes_zh.md "deploy/release_notes_zh.md"
          cp release_notes_en.md "deploy/release_notes.md"
          
          export DYLD_FRAMEWORK_PATH="$PWD"
          echo "$CLEAN_KEY" | ./bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/lpgneg19/inkies/releases/download/${{ env.VERSION_TAG }}/" \
            deploy/
          
          if [ -f "deploy/appcast.xml" ]; then
            mv deploy/appcast.xml .
            sed -i.bak '/<description>/d' appcast.xml
            sed -i.bak '/<sparkle:releaseNotesLink>/d' appcast.xml
            
            EN_LINK="https://github.com/lpgneg19/inkies/releases/download/${{ env.VERSION_TAG }}/release_notes_en.md"
            ZH_LINK="https://github.com/lpgneg19/inkies/releases/download/${{ env.VERSION_TAG }}/release_notes_zh.md"
            
            sed -i.bak "/<enclosure/i\\
            <sparkle:releaseNotesLink xml:lang=\"en\">$EN_LINK</sparkle:releaseNotesLink>" appcast.xml
            sed -i.bak "/<enclosure/i\\
            <sparkle:releaseNotesLink xml:lang=\"zh-Hans\">$ZH_LINK</sparkle:releaseNotesLink>" appcast.xml
            
            rm appcast.xml.bak
          else
            echo "ERROR: generate_appcast failed to produce appcast.xml."
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Release ${{ env.VERSION_TAG }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            inkies-*-Universal.dmg
            inkies-*-x86_64.dmg
            inkies-*-arm64.dmg
            ${{ env.ZIP_NAME }}
            release_notes_en.md
            release_notes_zh.md
            appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ env.VERSION }}"
          DMG_NAME="inkies-${VERSION}-Universal.dmg"
          SHA256=$(shasum -a 256 "$DMG_NAME" | awk '{print $1}')
          
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/lpgneg19/homebrew-tap.git tap-repo
          cd tap-repo
          
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/inkies.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/inkies.rb
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/inkies.rb
          git commit -m "Update inkies to $VERSION"
          git push
